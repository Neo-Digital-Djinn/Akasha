<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 980" role="img" style="font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; background: #ffffff;">
  <title>Akasha — Axioms, World &amp; Discovery mechanics overview</title>
  <desc>Three-layer structural diagram showing how Akasha's axiom layer, world schema, and discovery engine interact.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0f766e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#c2410c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="860" height="980" fill="#ffffff"/>

  <!-- ── LAYER LABELS (left rail) ── -->
  <text font-size="11" fill="#9ca3af" font-weight="500" letter-spacing="2" text-anchor="middle" transform="translate(20,148) rotate(-90)">AXIOMS</text>
  <text font-size="11" fill="#9ca3af" font-weight="500" letter-spacing="2" text-anchor="middle" transform="translate(20,430) rotate(-90)">WORLD</text>
  <text font-size="11" fill="#9ca3af" font-weight="500" letter-spacing="2" text-anchor="middle" transform="translate(20,740) rotate(-90)">DISCOVERY</text>

  <!-- ══ LAYER 1 — AXIOMS ══ -->
  <rect x="50" y="52" width="788" height="192" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="444" y="78" font-size="14" font-weight="600" fill="#4c1d95" text-anchor="middle">Akasha axioms  (10 invariants)</text>

  <!-- row 1 axiom pills -->
  <rect x="68" y="94" width="168" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="152" y="110" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Coherence</text>
  <text x="152" y="124" font-size="11" fill="#5b21b6" text-anchor="middle">contradictions = incomplete</text>

  <rect x="246" y="94" width="168" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="330" y="110" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Discoverability</text>
  <text x="330" y="124" font-size="11" fill="#5b21b6" text-anchor="middle">gaps are signals</text>

  <rect x="424" y="94" width="148" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="498" y="110" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Alignment</text>
  <text x="498" y="124" font-size="11" fill="#5b21b6" text-anchor="middle">must declare fit</text>

  <rect x="582" y="94" width="148" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="656" y="110" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Modularity</text>
  <text x="656" y="124" font-size="11" fill="#5b21b6" text-anchor="middle">connect by contract</text>

  <!-- row 2 axiom pills -->
  <rect x="68" y="142" width="128" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="132" y="158" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Traceability</text>
  <text x="132" y="172" font-size="11" fill="#5b21b6" text-anchor="middle">claims must anchor</text>

  <rect x="206" y="142" width="130" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="271" y="158" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Augmentation</text>
  <text x="271" y="172" font-size="11" fill="#5b21b6" text-anchor="middle">tools create tools</text>

  <rect x="346" y="142" width="118" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="405" y="158" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Iteration</text>
  <text x="405" y="172" font-size="11" fill="#5b21b6" text-anchor="middle">recursive revision</text>

  <rect x="474" y="142" width="128" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="538" y="158" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Stewardship</text>
  <text x="538" y="172" font-size="11" fill="#5b21b6" text-anchor="middle">humans govern</text>

  <rect x="612" y="142" width="118" height="38" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="671" y="158" font-size="13" font-weight="600" fill="#4c1d95" text-anchor="middle">Continuity</text>
  <text x="671" y="172" font-size="11" fill="#5b21b6" text-anchor="middle">knowledge compounds</text>

  <!-- discovery doctrine banner -->
  <rect x="68" y="192" width="720" height="38" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.5"/>
  <text x="428" y="208" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Discovery doctrine</text>
  <text x="428" y="222" font-size="11" fill="#6b7280" text-anchor="middle">observe → map → detect gap → hypothesize → test → evaluate → integrate → repeat</text>

  <!-- axioms → world arrow -->
  <line x1="444" y1="244" x2="444" y2="278" stroke="#7c3aed" stroke-width="1" marker-end="url(#arrow-purple)"/>
  <text x="458" y="264" font-size="11" fill="#7c3aed">governs</text>

  <!-- ══ LAYER 2 — WORLD ══ -->
  <rect x="50" y="280" width="788" height="260" rx="14" fill="#ccfbf1" stroke="#0f766e" stroke-width="0.5"/>
  <text x="444" y="306" font-size="14" font-weight="600" fill="#134e4a" text-anchor="middle">Akasha world  (canonical knowledge registry)</text>

  <!-- Graph schema box -->
  <rect x="68" y="318" width="240" height="200" rx="8" fill="#99f6e4" stroke="#0f766e" stroke-width="0.5"/>
  <text x="188" y="340" font-size="13" font-weight="600" fill="#134e4a" text-anchor="middle">Graph schema</text>
  <text x="188" y="360" font-size="11" fill="#0f766e" text-anchor="middle" font-weight="500">nodes</text>
  <text x="188" y="376" font-size="11" fill="#134e4a" text-anchor="middle">phase · transition</text>
  <text x="188" y="392" font-size="11" fill="#134e4a" text-anchor="middle">equilibrium · instability</text>
  <text x="188" y="408" font-size="11" fill="#134e4a" text-anchor="middle">constraint · attractor</text>
  <text x="188" y="430" font-size="11" fill="#0f766e" text-anchor="middle" font-weight="500">edges</text>
  <text x="188" y="446" font-size="11" fill="#134e4a" text-anchor="middle">transitions_to · stabilizes</text>
  <text x="188" y="462" font-size="11" fill="#134e4a" text-anchor="middle">destabilizes · tends_toward</text>
  <text x="188" y="478" font-size="11" fill="#134e4a" text-anchor="middle">emerges_from · triggers</text>
  <text x="188" y="494" font-size="11" fill="#134e4a" text-anchor="middle">constrained_by · settles_into</text>

  <!-- Lattice schema box -->
  <rect x="318" y="318" width="252" height="200" rx="8" fill="#99f6e4" stroke="#0f766e" stroke-width="0.5"/>
  <text x="444" y="340" font-size="13" font-weight="600" fill="#134e4a" text-anchor="middle">Lattice schema  (4-axis space)</text>
  <text x="444" y="360" font-size="11" fill="#0f766e" text-anchor="middle" font-weight="500">axes</text>
  <text x="444" y="376" font-size="11" fill="#134e4a" text-anchor="middle">phase: system · transition · attractor</text>
  <text x="444" y="392" font-size="11" fill="#134e4a" text-anchor="middle">stability: unstable → terminal</text>
  <text x="444" y="408" font-size="11" fill="#134e4a" text-anchor="middle">constraint: none → maximal</text>
  <text x="444" y="424" font-size="11" fill="#134e4a" text-anchor="middle">process: none · transform · converge</text>
  <text x="444" y="444" font-size="11" fill="#0f766e" text-anchor="middle" font-weight="500">validity rules</text>
  <text x="444" y="460" font-size="11" fill="#134e4a" text-anchor="middle">attractor ≠ transform / unstable</text>
  <text x="444" y="476" font-size="11" fill="#134e4a" text-anchor="middle">transition ≠ stable / none</text>
  <text x="444" y="492" font-size="11" fill="#134e4a" text-anchor="middle">system ≠ terminal</text>

  <!-- Lattice candidates box -->
  <rect x="580" y="318" width="240" height="200" rx="8" fill="#99f6e4" stroke="#0f766e" stroke-width="0.5"/>
  <text x="700" y="340" font-size="13" font-weight="600" fill="#134e4a" text-anchor="middle">Lattice candidates</text>
  <text x="700" y="358" font-size="11" fill="#6b7280" text-anchor="middle">(structural gaps found so far)</text>
  <text x="700" y="382" font-size="12" fill="#134e4a" text-anchor="middle" font-weight="500">critical_transition</text>
  <text x="700" y="396" font-size="11" fill="#134e4a" text-anchor="middle">system · unstable · strong · transform</text>
  <text x="700" y="418" font-size="12" fill="#134e4a" text-anchor="middle" font-weight="500">volatile_transition</text>
  <text x="700" y="432" font-size="11" fill="#134e4a" text-anchor="middle">transition · unstable · weak · transform</text>
  <text x="700" y="454" font-size="12" fill="#134e4a" text-anchor="middle" font-weight="500">recovery_boundary</text>
  <text x="700" y="470" font-size="11" fill="#134e4a" text-anchor="middle">system · unstable · weak · converge</text>
  <text x="700" y="492" font-size="12" fill="#134e4a" text-anchor="middle" font-weight="500">constraint_barrier</text>

  <!-- world → discovery arrow -->
  <line x1="444" y1="540" x2="444" y2="574" stroke="#0f766e" stroke-width="1" marker-end="url(#arrow-teal)"/>
  <text x="458" y="560" font-size="11" fill="#0f766e">feeds</text>

  <!-- ══ LAYER 3 — DISCOVERY ══ -->
  <rect x="50" y="576" width="788" height="370" rx="14" fill="#ffedd5" stroke="#c2410c" stroke-width="0.5"/>
  <text x="444" y="602" font-size="14" font-weight="600" fill="#7c2d12" text-anchor="middle">Akasha discovery engine</text>

  <!-- pipeline steps -->
  <rect x="66" y="616" width="106" height="44" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="0.5"/>
  <text x="119" y="633" font-size="13" font-weight="600" fill="#7c2d12" text-anchor="middle">1 Observe</text>
  <text x="119" y="647" font-size="11" fill="#9a3412" text-anchor="middle">read world</text>
  <line x1="172" y1="638" x2="188" y2="638" stroke="#c2410c" stroke-width="1" marker-end="url(#arrow-coral)"/>

  <rect x="190" y="616" width="104" height="44" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="0.5"/>
  <text x="242" y="633" font-size="13" font-weight="600" fill="#7c2d12" text-anchor="middle">2 Analyse</text>
  <text x="242" y="647" font-size="11" fill="#9a3412" text-anchor="middle">find patterns</text>
  <line x1="294" y1="638" x2="310" y2="638" stroke="#c2410c" stroke-width="1" marker-end="url(#arrow-coral)"/>

  <rect x="312" y="616" width="112" height="44" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="0.5"/>
  <text x="368" y="633" font-size="13" font-weight="600" fill="#7c2d12" text-anchor="middle">3 Detect gap</text>
  <text x="368" y="647" font-size="11" fill="#9a3412" text-anchor="middle">score nodes</text>
  <line x1="424" y1="638" x2="440" y2="638" stroke="#c2410c" stroke-width="1" marker-end="url(#arrow-coral)"/>

  <rect x="442" y="616" width="120" height="44" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="0.5"/>
  <text x="502" y="633" font-size="13" font-weight="600" fill="#7c2d12" text-anchor="middle">4 Hypothesize</text>
  <text x="502" y="647" font-size="11" fill="#9a3412" text-anchor="middle">generate proposal</text>
  <line x1="562" y1="638" x2="578" y2="638" stroke="#c2410c" stroke-width="1" marker-end="url(#arrow-coral)"/>

  <rect x="580" y="616" width="186" height="44" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="0.5"/>
  <text x="673" y="633" font-size="13" font-weight="600" fill="#7c2d12" text-anchor="middle">5 Review → integrate</text>
  <text x="673" y="647" font-size="11" fill="#9a3412" text-anchor="middle">human steward gate</text>

  <!-- CuriosityEngine box -->
  <rect x="66" y="678" width="358" height="130" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.5"/>
  <text x="245" y="700" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">CuriosityEngine  (curiosity_engine.py)</text>
  <text x="245" y="718" font-size="11" fill="#6b7280" text-anchor="middle">classify_gap(node)  →  gap_type + score</text>
  <text x="245" y="736" font-size="11" fill="#374151" text-anchor="middle">isolated  (0 in / 0 out)            score 1.0</text>
  <text x="245" y="752" font-size="11" fill="#374151" text-anchor="middle">structural_sink  (in / 0 out)       score 1.0</text>
  <text x="245" y="768" font-size="11" fill="#374151" text-anchor="middle">structural_source  (0 in / out)     score 0.6</text>
  <text x="245" y="784" font-size="11" fill="#374151" text-anchor="middle">intentional_terminal  (attractor)   score 0.2</text>
  <text x="245" y="800" font-size="11" fill="#374151" text-anchor="middle">balanced                            score 0.0</text>

  <!-- ArchitecturalGapDetector box -->
  <rect x="434" y="678" width="352" height="130" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="0.5"/>
  <text x="610" y="700" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">ArchitecturalGapDetector</text>
  <text x="610" y="718" font-size="11" fill="#6b7280" text-anchor="middle">reads akasha_anatomy.yaml</text>
  <text x="610" y="736" font-size="11" fill="#374151" text-anchor="middle">checks organ_families → expected_roles</text>
  <text x="610" y="752" font-size="11" fill="#374151" text-anchor="middle">emits missing_organ gaps</text>
  <text x="610" y="768" font-size="11" fill="#374151" text-anchor="middle">complements CuriosityEngine at</text>
  <text x="610" y="784" font-size="11" fill="#374151" text-anchor="middle">ecosystem architecture level</text>
  <text x="610" y="800" font-size="11" fill="#6b7280" text-anchor="middle">(node-level vs. repo-role level)</text>

  <!-- candidate format banner -->
  <rect x="66" y="826" width="720" height="40" rx="6" fill="#fed7aa" stroke="#c2410c" stroke-width="0.5"/>
  <text x="426" y="841" font-size="13" font-weight="600" fill="#7c2d12" text-anchor="middle">Candidate format  (recorded in /candidates)</text>
  <text x="426" y="857" font-size="11" fill="#9a3412" text-anchor="middle">gap_type · target node · reason · score · proposal — never writes directly to world</text>

  <!-- feedback arrow (left side, dashed) -->
  <path d="M 58 870 L 36 870 L 36 410 L 58 410" fill="none" stroke="#6b7280" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-size="10" fill="#9ca3af" text-anchor="middle" transform="translate(24,640) rotate(-90)">accepted candidates → world</text>

  <!-- Constellation box -->
  <rect x="50" y="890" width="788" height="70" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-width="0.5"/>
  <text x="444" y="912" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">Akasha constellation  (registry.yaml)</text>
  <text x="444" y="930" font-size="11" fill="#6b7280" text-anchor="middle">Maps all repos: engine · forge · node · device · academy · lab · graph · canon · runtime · adapter</text>
  <text x="444" y="948" font-size="11" fill="#6b7280" text-anchor="middle">Each repo must declare: role · layer · inputs · outputs · alignment statement → admission test (5 criteria)</text>
</svg>

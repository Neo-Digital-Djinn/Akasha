ecosystem: Akasha

repos:

  engine-discovery:
    role: engine
    layer: discovery
    description: Legacy discovery engine preserved for compatibility.

  engine-mythology:
    role: engine
    layer: interpretation
    description: Mythology interpretation engine for narrative and symbolic analysis.

  node-herald:
    role: node
    layer: distribution
    description: Distribution node responsible for publishing outputs and artifacts.

  forge-project:
    role: forge
    layer: creation
    description: Legacy forge system preserved for compatibility.

  akasha-axioms:
    role: foundation
    layer: constitutional
    description: Governing principles, ontology, doctrine, and system requirements for the Akasha ecosystem.

  akasha-world:
    role: registry
    layer: knowledge
    description: Canonical knowledge registry, naming conventions, and repository manifest schema.

  akasha-constellation:
    role: registry
    layer: ecosystem
    description: Ecosystem map tracking repositories, relationships, and operational flows.

  akasha-discovery:
    role: engine
    layer: discovery
    description: Discovery engine that proposes candidates, explores gaps, and records experiments.

  akasha-forge:
    role: forge
    layer: creation
    description: Construction engine that builds tools, modules, and repositories from approved discoveries.

  akasha-apis:
    role: interface
    layer: ingestion
    description: Standardized connectors and API interfaces for external data sources.

  akasha-collect:
    role: engine
    layer: ingestion
    description: Executes collectors defined in akasha-apis and gathers external artifacts.

  akasha-capital:
    role: engine
    layer: analysis
    description: >
      Capital flow and market-regime analysis engine. Classifies market regimes
      (EXPANSION, ROTATION, CONTRACTION, TRANSITION) from stablecoin flow,
      BTC dominance, funding bias, and volatility signals. Provides multi-asset
      portfolio analysis, Markov regime forecasting, and persistent regime memory.
      Emits Akasha-compatible event payloads for ingestion by akasha-events.
      Not a trading system — a structured observation and reasoning instrument.
    depends_on:
      - akasha-events
      - akasha-apis
    inputs:
      - stablecoin_inflow_signals
      - stablecoin_outflow_signals
      - funding_bias_readings
      - btc_dominance_readings
      - volatility_readings
    outputs:
      - regime_state_snapshots
      - divergence_reports
      - watchdog_alerts
      - markov_regime_forecasts
      - regime_memory_summaries
      - akasha_event_payloads
    canonical_status: canonical
    maturity: stable
    source_lineage: capital-suite-v5

  akasha-automaton:
    role: engine
    layer: simulation
    description: >
      Emergent-systems simulation and observation engine. Eight cellular automaton
      engines (Conway's Life, Reaction-Diffusion, Lenia, Brian's Brain, WireWorld,
      Langton's Ant, Cyclic CA, SmoothLife), nine render modes, genetic rule
      evolution, multi-universe forking, time-travel history, AI pattern analysis,
      Pattern DNA metrics, and a living README grid. Produces grid snapshots,
      Wolfram classifications, evolved rule sets, and Akasha-compatible emergence
      event payloads for akasha-events ingestion.
    depends_on:
      - akasha-events
      - akasha-axioms
    inputs:
      - rule_definitions
      - initial_grid_states
      - rle_pattern_strings
      - simulation_parameters
    outputs:
      - grid_state_snapshots
      - pattern_dna_metrics
      - wolfram_class_classifications
      - evolved_rule_sets
      - emergence_event_payloads
      - ai_pattern_analyses
    canonical_status: canonical
    maturity: stable
    source_lineage: Cellular_Automation_Explorer (ULTRAVERSE v10 / v8)

  akasha-alexandria:
    role: engine
    layer: verification
    canonical_status: canonical
    maturity: stable
    description: >
      Deterministic, auditable temporal kernel — Canonicalization Field.
      Treats history as primary; derives all state from an immutable, hash-chained
      ledger of events. Enforces invariant-bound state transitions via two-phase
      arc-consistency + energy-minimization constraint propagation. Validates
      hypotheses from any generator (manual, symbolic, LLM, HTTP bridge) against
      declared invariants and trust domains. Emits verified truth objects and
      equilibrium reports for downstream Akasha engines.
    depends_on:
      - akasha-axioms
      - akasha-world
      - akasha-constellation
    inputs:
      - hypothesis_json_payloads
      - ledger_jsonl_files
      - lattice_definitions
      - invariant_declarations
      - domain_trust_assignments
    outputs:
      - verified_truth_objects
      - hash_chained_ledger_entries
      - equilibrium_reports
      - provenance_chains
      - schema_inference_proposals
    alignment_statement: >
      This system is part of the Akasha ecosystem and aligns with
      akasha-axioms, akasha-world, and akasha-constellation.
    source_lineage: Alexandria-v9.0 (Termux/Android) → akasha-alexandria-v9.1.0 (Debian)

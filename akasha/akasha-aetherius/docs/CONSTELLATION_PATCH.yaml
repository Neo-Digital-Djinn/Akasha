# CONSTELLATION REGISTRY PATCH
# Merge this entry into akasha-constellation/registry.yaml
# under the `repos:` key.
#
# Admission confirmed by: AKASHA_ALIGNMENT.md + CONSTELLATION_ENTRY.md
# Tests passing: 9/9 (tests/test_smoke.py)

  akasha-aetherius:
    role: engine
    layer: management
    description: >
      Celestial GitHub issue management engine. Continuously scans declared
      repositories, ranks open issues by heuristic priority scoring
      (body length + label classification), generates code stubs via a
      pluggable LLM adapter, and records every action in an append-only
      Aetherius Ledger. A sliding-window Governor enforces GitHub API and
      LLM call rate limits. Human stewards approve all file writes and
      priority adjustments via a live React + SocketIO dashboard.
      Aligns with all 10 Akasha axioms. Ported from Termux Android
      prototype to Debian 13. MIT licensed.
    depends_on:
      - akasha-axioms
      - akasha-world
      - akasha-constellation
    inputs:
      - github_issue_streams
      - human_priority_adjustments
      - governor_configuration_commands
    outputs:
      - ranked_issue_lists
      - ledger_audit_entries
      - github_file_updates
      - socketio_live_update_events
      - governor_status_snapshots
    canonical_status: canonical
    maturity: stable
    source_lineage: Aetherius-Termux → akasha-aetherius (Debian 13 canonicalization)
